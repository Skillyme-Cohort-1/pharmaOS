[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA redirect rule - all routes go to index.html so React Router can handle them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
