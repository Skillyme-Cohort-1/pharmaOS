services:
  - type: web
    name: pharmaos-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npx prisma migrate deploy && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pharmaos-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: CLIENT_URL
        fromService:
          name: pharmaos-frontend
          type: web
          envVarKey: VERCEL_URL
      - key: JWT_SECRET
        generateValue: true
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: NEAR_EXPIRY_DAYS
        value: "7"

databases:
  - name: pharmaos-db
    databaseName: pharmaos
    plan: starter
